<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rompecabezas Romántico</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      color: white;
      margin-bottom: 10px;
      text-align: center;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }

    p {
      color: white;
      margin-bottom: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 90px);
      grid-template-rows: repeat(3, 90px);
      gap: 10px;
    }

    .piece {
      background: white;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      cursor: grab;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      user-select: none;
      transition: transform 0.2s;
      text-align: center;
      padding: 5px;
    }

    .piece:active {
      cursor: grabbing;
      transform: scale(1.05);
    }

    .hidden-message {
      margin-top: 25px;
      font-size: 22px;
      color: white;
      font-weight: bold;
      opacity: 0;
      transition: opacity 1s ease;
      text-align: center;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <h1>💖 Rompecabezas 💖</h1>
  <p>Ordena las piezas correctamente mi thalia ❤️</p>

  <div class="board" id="board"></div>

  <div class="hidden-message" id="finalMessage">
    🎉 Feliz 6 años y 1 mes mi Thalía ♥️ 🎉
  </div>

  <script>
    const words = [
      "Feliz", "6", "años", "y",
      "1", "mes", "mi", "Thalía",
      "♥️", "", "", ""
    ];

    const correctOrder = [...words];
    const shuffled = words.sort(() => 0.5 - Math.random());

    const board = document.getElementById("board");

    shuffled.forEach(word => {
      const div = document.createElement("div");
      div.className = "piece";
      div.draggable = true;
      div.textContent = word;
      board.appendChild(div);
    });

    let dragSrc = null;

    document.querySelectorAll(".piece").forEach(piece => {
      piece.addEventListener("dragstart", function(e) {
        dragSrc = this;
      });

      piece.addEventListener("dragover", function(e) {
        e.preventDefault();
      });

      piece.addEventListener("drop", function(e) {
        e.preventDefault();
        if (dragSrc !== this) {
          let temp = this.textContent;
          this.textContent = dragSrc.textContent;
          dragSrc.textContent = temp;
          checkOrder();
        }
      });
    });

    function checkOrder() {
      const current = Array.from(document.querySelectorAll(".piece")).map(p => p.textContent);
      if (JSON.stringify(current) === JSON.stringify(correctOrder)) {
        document.getElementById("finalMessage").classList.add("show");
      }
    }
  </script>

</body>
</html>
